<script>
        function selectItem(element, group) {
            // Find all buttons in the same container or logically grouped
            const container = element.parentElement;
            const buttons = container.querySelectorAll('.selectable-card');
            
            buttons.forEach(btn => {
                btn.classList.remove('selected');
                const span = btn.querySelector('.font-semibold');
                if (span) span.classList.replace('font-semibold', 'font-normal');
                
                // For feedback mode specifically
                const icon = btn.querySelector('.material-symbols-outlined');
                if (icon) {
                    icon.innerText = 'circle';
                    icon.classList.remove('text-secondary');
                    icon.classList.add('text-slate-700');
                }
            });

            element.classList.add('selected');
            const mainText = element.querySelector('.font-body-md') || element.querySelector('.font-body-sm');
            if (mainText) mainText.classList.add('font-semibold');

            // Feedback mode icon logic
            const activeIcon = element.querySelector('.material-symbols-outlined');
            if (activeIcon) {
                activeIcon.innerText = 'check_circle';
                activeIcon.classList.remove('text-slate-700');
                activeIcon.classList.add('text-secondary');
            }
        }

        function toggleSwitch(element) {
            const circle = element.querySelector('span');
            if (element.classList.contains('bg-secondary-container')) {
                element.classList.remove('bg-secondary-container');
                element.classList.add('bg-slate-700');
                circle.classList.remove('translate-x-6');
                circle.classList.add('translate-x-1');
            } else {
                element.classList.add('bg-secondary-container');
                element.classList.remove('bg-slate-700');
                circle.classList.remove('translate-x-1');
                circle.classList.add('translate-x-6');
            }
        }
    </script>
