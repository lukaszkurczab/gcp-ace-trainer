<style>
        body {
            background-color: #0c1324;
            color: #dce1fb;
            font-family: 'Hanken Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .selection-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .selection-card.active {
            border-color: #4f46e5;
            background-color: rgba(79, 70, 229, 0.08);
        }
        .time-chip.active {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- Top AppBar (Simulated Mobile Shell) -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md border-b border-outline-variant flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="grid_view">grid_view</span>
<h1 class="font-bold text-lg tracking-tight text-on-background">Patternly</h1>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest border border-outline-variant flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A professional headshot of a software engineer in a dark, tech-focused studio. The lighting is low-key with cool blue and violet undertones. The overall aesthetic is clean, sharp, and minimalist, matching a technical workplace environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuABbQ-qamAEYIR3muid9ttfUPNdGEC3-t_TiwEZy8PaRMTarJKaxsga3v3o1t0Sm713YAfhfmxwY-pC2yMSJ8Gu90dw7wQliuD49QC_prmxi1C4P5-NLrvoUeJjE9pRv6qrYOHaxjipzwVkOa65fiHm9W0csUiMP0Rigy0TXHQ9eBYZrI3u4MLeV3me0G2yl9IrvAx8aEYpxwZ4aScEteIAleZlV1I9YhWq9jslX1G0sE3sqBK8O7BlQw8o7Y5kKngeP-8Oo9jxMxD9">
</div>
</header>
<main class="w-full max-w-md px-6 pt-24 pb-32 flex flex-col gap-10">
<!-- Header Section -->
<section class="flex flex-col gap-3">
<h2 class="font-display-lg-mobile text-display-lg-mobile text-on-background">Set up your practice</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Choose the learning paths you want available and how much time you want to spend each day.</p>
</section>
<!-- Learning Paths Section -->
<section class="flex flex-col gap-6">
<h3 class="font-label-sm text-label-sm text-primary uppercase tracking-widest">LEARNING PATHS</h3>
<div class="grid grid-cols-1 gap-4">
<!-- Path 1: Cloud Certification -->
<button class="selection-card group text-left p-stack-lg rounded-2xl bg-surface-container border border-outline-variant hover:border-primary-container transition-all" onclick="toggleCard(this)">
<div class="flex justify-between items-start mb-3">
<span class="material-symbols-outlined text-tertiary" data-icon="cloud">cloud</span>
<div class="selection-indicator opacity-0 group-[.active]:opacity-100">
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<h4 class="font-headline-md text-lg text-on-background mb-1">Cloud Certification</h4>
<p class="font-body-md text-sm text-on-surface-variant leading-relaxed">Google Cloud ACE practice, exam-style questions, and domain review.</p>
</button>
<!-- Path 2: Algorithms -->
<button class="selection-card group text-left p-stack-lg rounded-2xl bg-surface-container border border-outline-variant hover:border-primary-container transition-all" onclick="toggleCard(this)">
<div class="flex justify-between items-start mb-3">
<span class="material-symbols-outlined text-secondary" data-icon="terminal">terminal</span>
<div class="selection-indicator opacity-0 group-[.active]:opacity-100">
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<h4 class="font-headline-md text-lg text-on-background mb-1">Algorithms</h4>
<p class="font-body-md text-sm text-on-surface-variant leading-relaxed">LeetCode-style patterns, strategy practice, and mistake review.</p>
</button>
<!-- Path 3: System Design (Disabled) -->
<div class="group text-left p-stack-lg rounded-2xl bg-surface-container/50 border border-outline-variant/30 opacity-50 cursor-not-allowed">
<div class="flex justify-between items-start mb-3">
<span class="material-symbols-outlined text-outline" data-icon="layers">layers</span>
<span class="font-code-xs text-[10px] bg-outline-variant/30 px-2 py-1 rounded text-on-surface-variant">LOCKED</span>
</div>
<h4 class="font-headline-md text-lg text-on-surface-variant mb-1">System Design</h4>
<p class="font-body-md text-sm text-outline leading-relaxed">Coming later</p>
</div>
</div>
</section>
<!-- Daily Session Length Section -->
<section class="flex flex-col gap-6">
<div class="flex flex-col gap-1">
<h3 class="font-label-sm text-label-sm text-primary uppercase tracking-widest">DAILY SESSION LENGTH</h3>
<p class="font-label-sm text-sm text-on-surface-variant">Used to size your daily sessions. Difficulty adapts from your answers.</p>
</div>
<div class="flex justify-between items-center gap-2 overflow-x-auto no-scrollbar pb-2">
<button class="time-chip flex-1 py-3 px-2 rounded-xl border border-outline-variant bg-surface-container-low font-label-sm text-center transition-all" onclick="selectTime(this)">5m</button>
<button class="time-chip flex-1 py-3 px-2 rounded-xl border border-outline-variant bg-surface-container-low font-label-sm text-center transition-all" onclick="selectTime(this)">10m</button>
<button class="time-chip active flex-1 py-3 px-2 rounded-xl border border-outline-variant bg-surface-container-low font-label-sm text-center transition-all" onclick="selectTime(this)">15m</button>
<button class="time-chip flex-1 py-3 px-2 rounded-xl border border-outline-variant bg-surface-container-low font-label-sm text-center transition-all" onclick="selectTime(this)">25m</button>
<button class="time-chip flex-1 py-3 px-2 rounded-xl border border-outline-variant bg-surface-container-low font-label-sm text-center transition-all" onclick="selectTime(this)">40m</button>
</div>
</section>
</main>
<!-- Footer Action -->
<footer class="fixed bottom-0 w-full max-w-md p-6 bg-gradient-to-t from-background via-background to-transparent z-50">
<button class="w-full py-4 rounded-2xl bg-gradient-to-r from-[#4f46e5] to-[#7c3aed] text-white font-headline-md text-lg shadow-lg shadow-primary-container/20 active:scale-95 transition-transform">
            Continue
        </button>
</footer>
<script>
        function toggleCard(el) {
            el.classList.toggle('active');
            // Logic to handle multi-select state can be added here
            if (el.classList.contains('active')) {
                const icon = el.querySelector('.selection-indicator span');
                icon.style.fontVariationSettings = "'FILL' 1";
            }
        }

        function selectTime(el) {
            const chips = document.querySelectorAll('.time-chip');
            chips.forEach(chip => chip.classList.remove('active'));
            el.classList.add('active');
        }

        // Handle micro-interaction for button press
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.opacity = '0.8';
            });
            btn.addEventListener('touchend', () => {
                btn.style.opacity = '1';
            });
        });
    </script>
</body></html>
