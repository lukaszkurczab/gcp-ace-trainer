<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Patternly | Premium Technical Workspace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        body {
            background-color: #0c1324;
            color: #dce1fb;
            overflow-x: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .pill-container {
            border: 1px solid rgba(70, 69, 85, 0.2);
            background: rgba(25, 31, 49, 0.4);
            backdrop-filter: blur(12px);
        }

        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#464555",
                        "surface-container-lowest": "#070d1f",
                        "on-secondary-container": "#c9aeff",
                        "error-container": "#93000a",
                        "secondary-fixed-dim": "#d2bbff",
                        "tertiary": "#89ceff",
                        "on-secondary-fixed-variant": "#5a00c6",
                        "secondary-container": "#6001d1",
                        "on-secondary": "#3f008e",
                        "surface-container-high": "#23293c",
                        "on-primary-container": "#dad7ff",
                        "primary-fixed": "#e2dfff",
                        "surface-container-low": "#151b2d",
                        "on-secondary-fixed": "#25005a",
                        "surface-container-highest": "#2e3447",
                        "surface": "#0c1324",
                        "on-primary-fixed": "#0f0069",
                        "inverse-primary": "#4d44e3",
                        "on-tertiary-fixed": "#001e2f",
                        "background": "#0c1324",
                        "error": "#ffb4ab",
                        "on-error": "#690005",
                        "surface-variant": "#2e3447",
                        "primary-fixed-dim": "#c3c0ff",
                        "on-surface-variant": "#c7c4d8",
                        "surface-dim": "#0c1324",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-error-container": "#ffdad6",
                        "on-tertiary": "#00344d",
                        "surface-tint": "#c3c0ff",
                        "tertiary-fixed-dim": "#89ceff",
                        "primary": "#c3c0ff",
                        "surface-container": "#191f31",
                        "inverse-surface": "#dce1fb",
                        "inverse-on-surface": "#2a3043",
                        "tertiary-fixed": "#c9e6ff",
                        "tertiary-container": "#006693",
                        "on-tertiary-fixed-variant": "#004c6e",
                        "secondary": "#d2bbff",
                        "on-tertiary-container": "#b8e0ff",
                        "outline": "#918fa1",
                        "surface-bright": "#33394c",
                        "primary-container": "#4f46e5",
                        "on-surface": "#dce1fb",
                        "on-background": "#dce1fb",
                        "secondary-fixed": "#eaddff",
                        "on-primary": "#1d00a5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "12px",
                        "stack-lg": "24px",
                        "container-margin": "32px",
                        "gutter": "24px",
                        "section-gap": "64px",
                        "stack-sm": "4px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "display-lg": ["Hanken Grotesk"],
                        "display-lg-mobile": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "label-sm": ["Hanken Grotesk"],
                        "code-xs": ["monospace"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "display-lg-mobile": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-sm": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "code-xs": ["12px", { "lineHeight": "16px", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>

<body class="min-h-screen flex flex-col font-body-md text-body-md selection:bg-primary-container selection:text-white bg-background">
<main class="relative z-10 flex-grow flex flex-col items-center justify-center px-container-margin py-section-gap">
<div class="max-w-screen-sm w-full text-center space-y-stack-lg">
<!-- Branding Header -->
<header class="animate-fade-in" style="animation-delay: 0.1s;">
<h1 class="font-display-lg text-display-lg-mobile md:text-display-lg tracking-tight text-on-surface">
                Patternly
            </h1>
<div class="h-0.5 w-8 bg-primary/40 mx-auto mt-4 rounded-full"></div>
</header>
<!-- Main Value Proposition -->
<div class="space-y-4 animate-fade-in" style="animation-delay: 0.2s;">
<h2 class="font-headline-md text-headline-md text-on-surface-variant max-w-md mx-auto">
                Train technical thinking through focused practice.
            </h2>
<p class="text-on-surface-variant/60 font-label-sm text-label-sm tracking-wide">
                Practice deliberately. Review mistakes. Recognize patterns.
            </p>
</div>
<!-- CTA Cluster -->
<div class="pt-8 flex flex-col items-center gap-6 animate-fade-in" style="animation-delay: 0.3s;">
<button class="btn-primary w-full max-w-[240px] py-3.5 px-8 text-white font-medium text-[16px] shadow-lg flex items-center justify-center gap-2 rounded-xl" style="background: linear-gradient(135deg, rgb(79, 70, 229) 0%, rgb(124, 58, 237) 100%);">
                Start setup
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<a class="text-on-surface-variant/50 hover:text-primary transition-colors font-label-sm text-label-sm tracking-wide flex items-center gap-1.5" href="#">
                Explore tracks
                <span class="material-symbols-outlined text-[14px]">north_east</span>
</a>
</div>
<!-- Simplified Feature Cards -->

</div>
</main>
<footer class="relative z-10 p-stack-lg text-center">
<!-- Minimal empty footer for balanced layout as per refined technical workspace aesthetic -->
</footer>






</body></html>
