<body class="font-body-md text-on-surface bg-background min-h-screen flex flex-col">
<!-- TopAppBar -->

<section class="mb-12">

<div class="p-6">

                </p>
</div>
</div>
</section>
<!-- Approach Selection Tabs -->
<div class="mb-8 border-b border-white/[0.04] flex gap-8 overflow-x-auto" id="approach-tabs"><button class="pb-4 px-1 border-b-2 border-primary text-white font-semibold text-sm transition-all whitespace-nowrap" id="tab-a" onclick="switchApproach('a')">Approach A: Iterative</button><button class="pb-4 px-1 border-b-2 border-transparent text-on-surface-variant/70 hover:text-white font-semibold text-sm transition-all whitespace-nowrap" id="tab-b" onclick="switchApproach('b')">Approach B: Hash Map</button></div>

<script>
        function switchApproach(approach) {
            const tabA = document.getElementById('tab-a');
            const tabB = document.getElementById('tab-b');
            const contentA = document.getElementById('approach-a-content');
            const contentB = document.getElementById('approach-b-content');

            if (approach === 'a') {
                tabA.classList.replace('border-transparent', 'border-primary');
                tabA.classList.replace('text-on-surface-variant', 'text-white');
                tabB.classList.replace('border-primary', 'border-transparent');
                tabB.classList.replace('text-white', 'text-on-surface-variant');
                contentA.classList.remove('hidden');
                contentB.classList.add('hidden');
            } else {
                tabB.classList.replace('border-transparent', 'border-primary');
                tabB.classList.replace('text-on-surface-variant', 'text-white');
                tabA.classList.replace('border-primary', 'border-transparent');
                tabA.classList.replace('text-white', 'text-on-surface-variant');
                contentB.classList.remove('hidden');
                contentA.classList.add('hidden');
            }
        }

        function selectOption(el) {
            document.querySelectorAll('button.group').forEach(btn => {
                btn.classList.remove('selected', 'border-primary/60', 'bg-primary/5');
                btn.classList.add('border-[#33394c]', 'bg-[#151b2d]');
                const box = btn.querySelector('.shrink-0');
                box.classList.remove('bg-primary/20', 'text-primary', 'border-primary/40');
                box.classList.add('border-[#33394c]', 'text-on-surface-variant');
            });
            
            el.classList.remove('border-[#33394c]', 'bg-[#151b2d]');
            el.classList.add('selected', 'border-primary/60', 'bg-primary/5');
            const indexBox = el.querySelector('.shrink-0');
            indexBox.classList.remove('border-[#33394c]', 'text-on-surface-variant');
            indexBox.classList.add('bg-primary/20', 'text-primary', 'border-primary/40');
        }
    </script>
